<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fetching Comments...</title>
  <style>
    * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
    body {
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 720px;
      background: #0b0b0b;
      border: 1px solid rgba(245,197,24,0.25);
      border-radius: 16px;
      padding: 26px;
      box-shadow: 0 0 25px rgba(245,197,24,0.08);
    }
    h1 { font-size: 1.6rem; color: #f5c518; margin-bottom: 10px; }
    p { color: #cfcfcf; margin-bottom: 18px; line-height: 1.5; }

    .bar-wrap {
      background: #111;
      border-radius: 999px;
      height: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f5c518, #d4a700);
      border-radius: 999px;
      transition: width 0.2s ease;
    }

    .kv {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .row {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 14px;
      padding: 12px 14px;
    }
    .label { color: rgba(255,255,255,0.72); font-size: 0.95rem; }
    .value { margin-top: 6px; color: #fff; font-weight: 800; font-size: 1.05rem; }

    .actions {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .btn {
      appearance: none;
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 1rem;
      transition: transform 0.06s ease, filter 0.2s ease;
    }
    .btn:active { transform: translateY(1px); }
    .btn-primary { background-color: #f5c518; color: #000; }
    .btn-secondary { background: rgba(255,255,255,0.06); color: #fff; border: 1px solid rgba(255,255,255,0.12); }

    @media (max-width: 480px) {
      h1 { font-size: 1.3rem; }
      .card { padding: 18px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Fetching YouTube comments…</h1>
    <p id="message">Starting…</p>

    <div class="bar-wrap" aria-label="progress">
      <div class="bar" id="bar"></div>
    </div>

    <div class="kv">
      <div class="row">
        <div class="label">Extracted (raw)</div>
        <div class="value" id="rawCount">0</div>
      </div>
      <div class="row">
        <div class="label">Extracted (after cleaning)</div>
        <div class="value" id="cleanCount">0</div>
      </div>
      <div class="row">
        <div class="label">Video ID</div>
        <div class="value" id="videoId">—</div>
      </div>
    </div>

    <div class="actions">
      <a class="btn btn-secondary" href="{{ url_for('home') }}">← Back</a>
      <a class="btn btn-primary" id="downloadBtn" style="display:none;" href="#" target="_blank">Download CSV</a>
      <a class="btn btn-secondary" id="analysisBtn" style="display:none;" href="#" target="_blank">View Analysis</a>
    </div>


    <p style="margin-top:14px;color:rgba(255,255,255,0.7);font-size:0.95rem;">
      This may take a while depending on the video and your network.
    </p>
  </div>

  <script>
    const jobId = "{{ job_id }}";

    const bar = document.getElementById('bar');
    const msg = document.getElementById('message');
    const rawCountEl = document.getElementById('rawCount');
    const cleanCountEl = document.getElementById('cleanCount');
    const videoIdEl = document.getElementById('videoId');
    const downloadBtn = document.getElementById('downloadBtn');
    const analysisBtn = document.getElementById('analysisBtn');


    function setProgress(p) {
      const clamped = Math.max(0, Math.min(100, p));
      bar.style.width = clamped + '%';
    }

    async function poll() {
      try {
        const res = await fetch(`/status/${jobId}`, { cache: 'no-store' });
        if (!res.ok) {
          msg.textContent = `Status error (${res.status})`;
          setTimeout(poll, 1000);
          return;
        }

        const data = await res.json();
        setProgress(data.progress || 0);
        msg.textContent = data.message || data.state || 'Working...';

        if (typeof data.extracted_raw === 'number') rawCountEl.textContent = data.extracted_raw;
        if (typeof data.extracted_clean === 'number') cleanCountEl.textContent = data.extracted_clean;
        if (data.video_id) videoIdEl.textContent = data.video_id;

        if (data.state === 'done') {
          downloadBtn.href = `/download/${jobId}`;
          downloadBtn.style.display = 'inline-flex';

          analysisBtn.href = `/analysis/${jobId}`;
          analysisBtn.style.display = 'inline-flex';

          msg.textContent = 'Completed. View analysis below.';
          return;
        }


        if (data.state === 'error') {
          msg.textContent = data.error ? `Failed: ${data.error}` : 'Failed.';
          return;
        }
      } catch (e) {
        msg.textContent = 'Network error while polling status.';
      }

      setTimeout(poll, 1000);
    }

    setTimeout(poll, 500);
  </script>
</body>
</html>
